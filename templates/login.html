<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white text-center">
                        <h4>Entrar no Sistema</h4>
                    </div>
                    <div class="card-body">
                        <form method="POST" action="#">
                            <!-- Campo de Email -->
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" placeholder="Digite seu email">
                                <!-- Mensagens de erro podem ser inseridas aqui manualmente -->
                            </div>

                            <!-- Campo de Senha -->
                            <div class="mb-3">
                                <label for="senha" class="form-label">Senha</label>
                                <input type="password" class="form-control" id="senha" placeholder="Digite sua senha">
                                <!-- Mensagens de erro podem ser inseridas aqui manualmente -->
                            </div>

                            <!-- Botão de Enviar -->
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">Entrar</button>
                            </div>

                            <!-- Links adicionais -->
                            <div class="mt-3 text-center">
                                <a href="register.html">Criar conta</a> |
                                <a href="recuperar_senha.html">Esqueci minha senha</a>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Mensagem de login simulada -->
                <div class="alert alert-success mt-3 text-center" style="display: none;">
                    Você está logado como <strong>usuário_exemplo</strong>.
                </div>
            </div>
        </div>
    </div>
</body>
</html>
